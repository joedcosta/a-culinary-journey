<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0d0a"/>
  <!-- Subtle texture lines -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#grain)" opacity="0.03"/>
  <!-- Gold accent left bar -->
  <rect x="80" y="80" width="2" height="470" fill="#c8843a" opacity="0.5"/>
  <!-- Gold accent top line -->
  <rect x="80" y="80" width="440" height="1" fill="#c8843a" opacity="0.3"/>
  <!-- Gold accent bottom line -->
  <rect x="80" y="550" width="440" height="1" fill="#c8843a" opacity="0.3"/>
  <!-- Eyebrow -->
  <text x="100" y="140" font-family="Georgia,serif" font-size="18" fill="#c8843a" letter-spacing="6" opacity="0.9">J. D'COSTA ANDRADE</text>
  <!-- Main title line 1 -->
  <text x="100" y="240" font-family="Georgia,serif" font-size="78" font-weight="bold" fill="#f0e8d8">EINE</text>
  <!-- Main title line 2 -->
  <text x="100" y="330" font-family="Georgia,serif" font-size="78" font-weight="bold" fill="#f0e8d8">KULINARISCHE</text>
  <!-- Main title line 3 -->
  <text x="100" y="420" font-family="Georgia,serif" font-size="78" font-weight="bold" fill="#f0e8d8">REISE</text>
  <!-- Subtitle -->
  <text x="100" y="480" font-family="Georgia,serif" font-size="22" font-style="italic" fill="#cfc0a2">Geschichten &amp; Erzählungen · die Basis aller Speisen</text>
  <!-- Edition badge -->
  <rect x="100" y="506" width="280" height="28" fill="none" stroke="#c8843a" stroke-width="1" opacity="0.4"/>
  <text x="240" y="525" font-family="Georgia,serif" font-size="12" fill="#c8843a" text-anchor="middle" letter-spacing="3">1. AUFLAGE · FIRST EDITION · 2026</text>
  <!-- Decorative ornament right side -->
  <text x="900" y="340" font-family="Georgia,serif" font-size="320" font-style="italic" fill="#c8843a" opacity="0.04">K</text>
  <!-- joedcosta.com -->
  <text x="1120" y="580" font-family="Georgia,serif" font-size="16" fill="#7a6e60" text-anchor="end" letter-spacing="2">joedcosta.com</text>
</svg>
