<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="fadeR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="35%" stop-color="#0f0d0a" stop-opacity="0"/>
      <stop offset="75%" stop-color="#0f0d0a" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0f0d0a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0d0a" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#0f0d0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="65%" stop-color="#0f0d0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f0d0a" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8843a" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#c8843a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c8843a" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="photoClip">
      <rect x="0" y="0" width="640" height="630"/>
    </clipPath>
  </defs>

  <!-- full dark background -->
  <rect width="1200" height="630" fill="#0f0d0a"/>

  <!-- book cover photo — left half -->
  <image clip-path="url(#photoClip)"
    href="https://res.cloudinary.com/djzg1ulup/image/upload/v1771739932/Front__Cover_jgrhgf.jpg"
    x="0" y="0" width="640" height="630"
    preserveAspectRatio="xMidYMid slice"/>

  <!-- overlay fades -->
  <rect x="0" y="0" width="640" height="630" fill="url(#fadeR)"/>
  <rect x="0" y="0" width="640" height="630" fill="url(#fadeT)"/>
  <rect x="0" y="0" width="640" height="630" fill="url(#fadeB)"/>

  <!-- subtle vertical separator -->
  <rect x="598" y="55" width="1" height="520" fill="#c8843a" opacity="0.18"/>

  <!-- ── RIGHT PANEL TEXT ── -->

  <!-- Author -->
  <text x="640" y="130"
    font-family="Georgia,serif" font-size="17"
    fill="#c8843a" letter-spacing="4">J. D'COSTA ANDRADE</text>

  <!-- Italic A Culinary Journey -->
  <text x="640" y="162"
    font-family="Georgia,serif" font-size="20"
    font-style="italic" fill="#d4a85c" letter-spacing="1">A Culinary Journey</text>

  <!-- top rule -->
  <rect x="640" y="182" width="490" height="1" fill="url(#gr)"/>

  <!-- EINE -->
  <text x="640" y="272"
    font-family="Georgia,serif" font-size="92"
    font-weight="bold" fill="#ffffff">EINE</text>

  <!-- KULINARISCHE -->
  <text x="640" y="352"
    font-family="Georgia,serif" font-size="62"
    font-weight="bold" fill="#ffffff">KULINARISCHE</text>

  <!-- REISE -->
  <text x="640" y="440"
    font-family="Georgia,serif" font-size="92"
    font-weight="bold" fill="#ffffff">REISE</text>

  <!-- bottom rule -->
  <rect x="640" y="458" width="490" height="1.5" fill="url(#gr)"/>

  <!-- Edition badge -->
  <rect x="640" y="478" width="348" height="32"
    fill="none" stroke="#c8843a" stroke-width="0.8" opacity="0.5"/>
  <text x="814" y="499"
    font-family="Georgia,serif" font-size="11.5"
    fill="#c8843a" text-anchor="middle" letter-spacing="3.5">1. AUFLAGE · FIRST EDITION · 2026</text>

  <!-- domain -->
  <text x="1155" y="612"
    font-family="Georgia,serif" font-size="14"
    fill="#7a6e60" text-anchor="end" letter-spacing="2.5">joedcosta.com</text>

</svg>
